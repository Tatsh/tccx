name: tests
on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:
jobs:
  test:
    name: Test + coverage
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Run tests with coverage
        run: swift test --enable-code-coverage
      - name: Export lcov
        run: |
          bin="$(swift build --show-bin-path)"
          prof="$bin/codecov/default.profdata"
          xctest="$(find "$bin" -name '*.xctest' -maxdepth 1 | head -1)"
          exe="$xctest/Contents/MacOS/$(basename "$xctest" .xctest)"
          xcrun llvm-cov report "$exe" -instr-profile "$prof" \
            -ignore-filename-regex='(Tests|\.build)/'
          xcrun llvm-cov export -format=lcov "$exe" -instr-profile "$prof" \
            -ignore-filename-regex='(Tests|\.build)/' > coverage.lcov
      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: coverage.lcov
          format: lcov
